<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background: linear-gradient(135deg,#0a0a0a,#1a1a1a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:420px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.06);
backdrop-filter: blur(25px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h1{
text-align:center;
margin-bottom:15px;
}

.item{
background:rgba(255,255,255,0.05);
padding:12px;
margin:10px 0;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid rgba(255,255,255,0.08);
}

button{
background:rgba(255,255,255,0.15);
border:none;
color:white;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:rgba(255,255,255,0.3);
}

.code{
margin-top:15px;
text-align:center;
}

input{
padding:8px;
border-radius:10px;
border:none;
outline:none;
width:70%;
}

</style>
</head>

<body>

<div class="container">

<h1>Item Shop</h1>

<div class="item">
<span>Darkbringer — 36 R$</span>
<button onclick="buy()">Purchase</button>
</div>

<div class="item">
<span>Lightbringer — 32 R$</span>
<button onclick="buy()">Purchase</button>
</div>

<div class="item">
<span>Plasma Set — 29 R$</span>
<button onclick="buy()">Purchase</button>
</div>

<p style="text-align:center; font-size:12px; opacity:0.8;">
Every order includes a free random colored Seer 🎁
</p>

<div class="code">
<p>Promo Code:</p>
<input id="promo" placeholder="Enter code">
</div>

</div>

<script>

function buy(){
window.location.href =
"https://www.roblox.com/users/2865023921/profile";
}

document.getElementById("promo").addEventListener("change", function(){
if(this.value === "EPICXD"){
alert("Code applied: EPICXD ✔");
} else if(this.value !== ""){
alert("Invalid code");
}
});

</script>

</body>
</html>
